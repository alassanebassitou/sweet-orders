spring:
  application:
    name: Patisserie-App

  datasource:
    url: jdbc:postgresql://localhost:5433/cakestore
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  open-in-view: false
  properties:
    hibernate:
      format_sql: true
      jdbc:
        batch_size=20
      connection:
        provider_disables_autocommit: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  devtools:
    restart:
      enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB      # max per file
      max-request-size: 20MB # max total request

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_USER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  session:
    ttl-hours: 8
    header-name: X-Session-Id   # Header the frontend sends on every request

  cors:
    allowed-origins:
      - http://localhost:8090
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    allowed-headers: "*"
    exposed-headers: "*"
    allow-credentials: true

  kkiapay:
    public-key: ${KKIAPAY_PUBLIC_KEY}
    private-key: ${KKIAPAY_PRIVATE_KEY}
    secret-key: ${KKIAPAY_SECRET_KEY}
    sandbox: true
    base-url: https://api-sandbox.kkiapay.me

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    # Folder structure in Cloudinary
    folders:
      products: sweet-orders/products
      categories: sweet-orders/categories


  mail:
    from: ${MAIL_USERNAME}
    from-name: "Ma Pâtisserie"
    app-url: http://localhost:8090
    app-name: "Sweet Orders"


springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      tags-sorter: alpha
      operations-sorter: alpha
      display-request-duration: true
      try-it-out-enabled: true

logging:
  level:
    #org.springframework.security: DEBUG
    org.springframework.security: TRACE
    com.devcrafter.Patisserie.App: DEBUG